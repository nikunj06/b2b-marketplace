<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Marketplace — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a56db;
            --primary-dark: #1341a8;
            --accent: #f59e0b;
            --bg: #f0f4ff;
        }
        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .brand { font-family: 'Sora', sans-serif; font-weight: 700; color: var(--primary); letter-spacing: -0.5px; }
        .brand span { color: var(--accent); }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(26,86,219,0.12);
        }
        .btn-primary { background: var(--primary); border-color: var(--primary); font-weight: 600; border-radius: 8px; }
        .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
        .form-control { border-radius: 8px; border: 1.5px solid #d1d5db; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
        #alertBox { display: none; }
    </style>
</head>
<body>
<div class="container" style="max-width:420px;">
    <div class="text-center mb-4">
        <div class="brand fs-3 mb-1">B2B<span>Market</span></div>
        <p class="text-muted small">Manufacturer ↔ Retailer Platform</p>
    </div>
    <div class="card p-4">
        <h5 class="fw-bold mb-4 text-center">Sign In to Your Account</h5>
        <div id="alertBox" class="alert alert-danger small py-2"></div>
        <div class="mb-3">
            <label class="form-label fw-500 small">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="you@company.com">
        </div>
        <div class="mb-4">
            <label class="form-label fw-500 small">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••">
        </div>
        <button class="btn btn-primary w-100 py-2" onclick="doLogin()">Sign In</button>
        <hr class="my-3">
        <p class="text-center small mb-0">
            Don't have an account? <a href="register.html" class="text-primary fw-600">Register here</a>
        </p>
    </div>
    <p class="text-center text-muted small mt-3">
        Demo: <code>admin@b2b.com</code> / <code>password123</code>
    </p>
</div>
<script>
    // Redirect if already logged in
    const user  = JSON.parse(localStorage.getItem('user') || 'null');
    if (user) {
        redirectByRole(user.role);
    }

    function redirectByRole(role) {
        if (role === 'admin')        window.location.href = 'admin.html';
        else if (role === 'manufacturer') window.location.href = 'manufacturer.html';
        else if (role === 'retailer')     window.location.href = 'retailer.html';
    }

    async function doLogin() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const alertBox = document.getElementById('alertBox');
        alertBox.style.display = 'none';

        if (!email || !password) {
            alertBox.textContent = 'Please enter email and password.';
            alertBox.style.display = 'block';
            return;
        }

        try {
            const resp = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await resp.json();

            if (data.success) {
                localStorage.setItem('user', JSON.stringify(data.user));
                redirectByRole(data.user.role);
            } else {
                alertBox.textContent = data.message;
                alertBox.style.display = 'block';
            }
        } catch (err) {
            alertBox.textContent = 'Connection error. Is the server running?';
            alertBox.style.display = 'block';
        }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
