<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manufacturer Dashboard — B2B Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#1a56db; --primary-dark:#1341a8; --accent:#f59e0b; --sidebar:#0f2057; }
        body { font-family:'Inter',sans-serif; background:#f3f6fc; }
        /* Navbar */
        .navbar { background:var(--sidebar)!important; }
        .navbar-brand { font-family:'Sora',sans-serif; font-weight:700; color:#fff!important; font-size:1.2rem; }
        .navbar-brand span { color:var(--accent); }
        .nav-link { color:rgba(255,255,255,0.8)!important; font-size:.9rem; }
        .nav-link.active,.nav-link:hover { color:#fff!important; }
        /* Cards */
        .stat-card { border:none; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,.07); }
        .stat-card .icon { width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem; }
        /* Section cards */
        .section-card { border:none; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,.07); }
        .section-card .card-header { background:#fff; border-bottom:1px solid #e5e7eb; border-radius:12px 12px 0 0!important; font-weight:600; }
        /* Table */
        .table th { font-size:.8rem; text-transform:uppercase; letter-spacing:.5px; color:#6b7280; background:#f9fafb; }
        .table td { font-size:.875rem; vertical-align:middle; }
        /* Badge */
        .badge-pending  { background:#fef3c7; color:#92400e; }
        .badge-approved { background:#d1fae5; color:#065f46; }
        .badge-rejected { background:#fee2e2; color:#991b1b; }
        .badge-completed{ background:#dbeafe; color:#1e40af; }
        .status-badge { padding:3px 10px; border-radius:20px; font-size:.75rem; font-weight:600; }
        /* Form */
        .form-control,.form-select { border-radius:8px; border:1.5px solid #d1d5db; font-size:.875rem; }
        .form-control:focus,.form-select:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(26,86,219,.1); }
        .btn-primary { background:var(--primary); border:none; border-radius:8px; font-weight:600; }
        .btn-primary:hover { background:var(--primary-dark); }
        /* Tab content */
        .tab-pane { padding-top:1.5rem; }
        #alertMsg { display:none; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">
        <span class="navbar-brand">B2B<span>Market</span></span>
        <div class="d-flex align-items-center gap-3 ms-auto">
            <span class="text-white-50 small" id="welcomeMsg"></span>
            <button class="btn btn-sm btn-outline-light" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 py-4">

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-2" id="mainTabs">
        <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tabProducts">My Products</a></li>
        <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tabAddProduct">Add Product</a></li>
        <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tabOrders">Incoming Orders</a></li>
    </ul>

    <div class="tab-content">

        <!-- ===== TAB: My Products ===== -->
        <div class="tab-pane fade show active" id="tabProducts">
            <div class="section-card card">
                <div class="card-header d-flex justify-content-between align-items-center py-3">
                    <span>My Products &amp; Inventory</span>
                    <button class="btn btn-sm btn-primary" onclick="loadProducts()">↻ Refresh</button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table mb-0">
                            <thead>
                                <tr>
                                    <th>ID</th><th>Image</th><th>Product Name</th><th>Category</th>
                                    <th>Min. Order Qty</th><th>Stock</th><th>Wholesale Price (₹)</th>
                                </tr>
                            </thead>
                            <tbody id="productsBody">
                                <tr><td colspan="6" class="text-center text-muted py-4">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== TAB: Add Product ===== -->
        <div class="tab-pane fade" id="tabAddProduct">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="section-card card">
                        <div class="card-header py-3">Add New Product</div>
                        <div class="card-body">
                            <div id="alertMsg" class="alert small py-2"></div>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Product Name</label>
                                <input type="text" id="product_name" class="form-control" placeholder="e.g. Cotton Plain Fabric">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Category</label>
                                <input type="text" id="category" class="form-control" placeholder="e.g. Textiles, Electronics">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Description</label>
                                <textarea id="description" class="form-control" rows="2" placeholder="Short description"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Product Image (Optional)</label>
                                <input type="file" id="image" class="form-control" accept="image/*">
                            </div>
                            <div class="row">
                                <div class="col mb-3">
                                    <label class="form-label small fw-semibold">Min. Order Qty</label>
                                    <input type="number" id="minimum_order_quantity" class="form-control" placeholder="50" min="1">
                                </div>
                                <div class="col mb-3">
                                    <label class="form-label small fw-semibold">Stock Quantity</label>
                                    <input type="number" id="stock_quantity" class="form-control" placeholder="500" min="0">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label small fw-semibold">Wholesale Price (₹)</label>
                                <input type="number" id="wholesale_price" class="form-control" placeholder="85.00" step="0.01" min="0">
                            </div>
                            <button class="btn btn-primary w-100" onclick="addProduct()">Add Product</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== TAB: Orders ===== -->
        <div class="tab-pane fade" id="tabOrders">
            <div class="section-card card">
                <div class="card-header d-flex justify-content-between align-items-center py-3">
                    <span>Incoming Orders</span>
                    <button class="btn btn-sm btn-primary" onclick="loadOrders()">↻ Refresh</button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table mb-0">
                            <thead>
                                <tr>
                                    <th>Order ID</th><th>Date</th><th>Retailer</th>
                                    <th>Product</th><th>Qty</th><th>Value (₹)</th>
                                    <th>Status</th><th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="ordersBody">
                                <tr><td colspan="8" class="text-center text-muted py-4">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div><!-- tab-content -->
</div><!-- container -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const user  = JSON.parse(localStorage.getItem('user') || 'null');

    if (!user || user.role !== 'manufacturer') {
        window.location.href = 'login.html';
    }

    document.getElementById('welcomeMsg').textContent = `Welcome, ${user.name}`;

    function authHeaders() {
        return { 'Content-Type': 'application/json' };
    }

    function statusBadge(s) {
        const map = { pending:'badge-pending', approved:'badge-approved', rejected:'badge-rejected', completed:'badge-completed' };
        return `<span class="status-badge ${map[s]||''}">${s}</span>`;
    }

    async function loadProducts() {
        const tb = document.getElementById('productsBody');
        tb.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">Loading...</td></tr>';
        try {
            const r = await fetch(`/api/products/manufacturer/${user.role_id}`, { headers: authHeaders() });
            const d = await r.json();
            if (!d.success || d.products.length === 0) {
                tb.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No products yet. Use "Add Product" tab.</td></tr>';
                return;
            }
            tb.innerHTML = d.products.map(p => `
                <tr>
                    <td>${p.product_id}</td>
                    <td>${p.image_url ? `<img src="${p.image_url}" alt="img" class="rounded" width="40" height="40" style="object-fit:cover;">` : '<div class="bg-light rounded text-center text-muted" style="width:40px;height:40px;line-height:40px;font-size:10px;">IMG</div>'}</td>
                    <td>${p.product_name}</td>
                    <td><span class="badge bg-secondary">${p.category}</span></td>
                    <td>${p.minimum_order_quantity}</td>
                    <td>${p.stock_quantity <= 50 ? `<span class="text-danger fw-semibold">${p.stock_quantity}</span>` : p.stock_quantity}</td>
                    <td>₹${parseFloat(p.wholesale_price).toFixed(2)}</td>
                </tr>
            `).join('');
        } catch (e) {
            tb.innerHTML = '<tr><td colspan="7" class="text-danger text-center py-4">Error loading products.</td></tr>';
        }
    }

    async function loadOrders() {
        const tb = document.getElementById('ordersBody');
        tb.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">Loading...</td></tr>';
        try {
            const r = await fetch(`/api/orders/manufacturer/${user.role_id}`, { headers: authHeaders() });
            const d = await r.json();
            if (!d.success || d.orders.length === 0) {
                tb.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">No orders yet.</td></tr>';
                return;
            }
            tb.innerHTML = d.orders.map(o => `
                <tr>
                    <td>#${o.order_id}</td>
                    <td>${new Date(o.order_date).toLocaleDateString()}</td>
                    <td>${o.retailer}</td>
                    <td>${o.product_name}</td>
                    <td>${o.quantity}</td>
                    <td>₹${parseFloat(o.line_total).toFixed(2)}</td>
                    <td>${statusBadge(o.order_status)}</td>
                    <td>
                        ${o.order_status === 'pending' ? `
                            <button class="btn btn-sm btn-success me-1" onclick="updateStatus(${o.order_id},'approved')">Approve</button>
                            <button class="btn btn-sm btn-danger"  onclick="updateStatus(${o.order_id},'rejected')">Reject</button>
                        ` : o.order_status === 'approved' ? `
                            <button class="btn btn-sm btn-primary" onclick="updateStatus(${o.order_id},'completed')">Complete</button>
                        ` : '—'}
                    </td>
                </tr>
            `).join('');
        } catch (e) {
            tb.innerHTML = '<tr><td colspan="8" class="text-danger text-center py-4">Error loading orders.</td></tr>';
        }
    }

    async function addProduct() {
        const alertMsg = document.getElementById('alertMsg');
        alertMsg.style.display = 'none';
        const minQty = parseInt(document.getElementById('minimum_order_quantity').value);
        const stQty = parseInt(document.getElementById('stock_quantity').value);
        const price = parseFloat(document.getElementById('wholesale_price').value);
        const name = document.getElementById('product_name').value.trim();
        const cat = document.getElementById('category').value.trim();

        if (!name || !cat || isNaN(minQty) || isNaN(stQty) || isNaN(price)) {
            alertMsg.className = 'alert alert-danger small py-2';
            alertMsg.textContent = 'Please fill in all fields correctly.';
            alertMsg.style.display = 'block';
            return;
        }

        const formData = new FormData();
        formData.append('product_name', name);
        formData.append('category', cat);
        formData.append('description', document.getElementById('description').value.trim());
        formData.append('minimum_order_quantity', minQty);
        formData.append('stock_quantity', stQty);
        formData.append('wholesale_price', price);
        const fileInput = document.getElementById('image');
        if (fileInput.files[0]) {
            formData.append('image', fileInput.files[0]);
        }

        try {
            const r = await fetch('/api/products/add', { method:'POST', body: formData });
            const d = await r.json();
            alertMsg.className = d.success ? 'alert alert-success small py-2' : 'alert alert-danger small py-2';
            alertMsg.textContent = d.message;
            alertMsg.style.display = 'block';
            if (d.success) {
                ['product_name','category','description','minimum_order_quantity','stock_quantity','wholesale_price','image'].forEach(id => document.getElementById(id).value = '');
            }
        } catch (e) {
            alertMsg.className = 'alert alert-danger small py-2';
            alertMsg.textContent = 'Server error.';
            alertMsg.style.display = 'block';
        }
    }

    async function updateStatus(orderId, status) {
        try {
            const r = await fetch('/api/orders/status', {
                method:'PUT', headers: authHeaders(),
                body: JSON.stringify({ order_id: orderId, status })
            });
            const d = await r.json();
            alert(d.message);
            loadOrders();
        } catch (e) {
            alert('Error updating status.');
        }
    }

    async function logout() {
        await fetch('/api/auth/logout', { method: 'POST' });
        localStorage.removeItem('user');
        window.location.href = 'login.html';
    }

    // Load on tab switch
    document.querySelectorAll('[data-bs-toggle="tab"]').forEach(tab => {
        tab.addEventListener('shown.bs.tab', e => {
            if (e.target.getAttribute('href') === '#tabProducts') loadProducts();
            if (e.target.getAttribute('href') === '#tabOrders')   loadOrders();
        });
    });

    loadProducts();
</script>
</body>
</html>
